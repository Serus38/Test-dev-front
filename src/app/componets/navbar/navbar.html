<aside class="sidebar" aria-label="Navegacion principal">
	<a class="brand" routerLink="/dashboard" aria-label="Ir a la lista de clientes">Envios App</a>

	@if (isLoggedIn()) {
	<div class="user-section">
		<div class="user-info">
			<small>Usuario</small>
			<p>{{ user() }}</p>
		</div>
		<button class="btn btn-danger btn-sm" (click)="logout()">
			Cerrar Sesión
		</button>
	</div>
	}

	<nav class="menu" aria-label="Menu principal">
		<a class="menu-btn dashboard-btn" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
			>Dashboard</a
		>
		<a
			class="menu-btn"
			[routerLink]="activeSection().listPath"
			routerLinkActive="active"
			[routerLinkActiveOptions]="{ exact: true }"
		>{{ activeSection().listLabel }}</a>
		<a class="menu-btn" [routerLink]="activeSection().newPath" routerLinkActive="active">{{ activeSection().newLabel }}</a>
	</nav>

	<div class="extras" aria-label="Acciones secundarias">
		@for (section of secondarySections; track section.key) {
			<a
				class="menu-btn secondary"
				[class.active]="activeSection().key === section.key"
				[routerLink]="section.listPath"
			>{{ section.label }}</a>
		}
	</div>
</aside>
